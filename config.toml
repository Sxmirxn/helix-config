theme = "base16_transparent"

[editor]
mouse = false
bufferline =  "multiple"
color-modes = true

[editor.cursor-shape]
insert = "bar"

[keys.normal]
esc = ["collapse_selection", "keep_primary_selection"]

[editor.statusline.mode]

insert = "INSERT"
normal = "NORMAL"
select = "SELECT"

[editor.statusline]

left = ["mode","file-base-name"]
right = ["file-type","separator", "position"]
